name: Lint GitHub Actions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflow files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # raven-actions/actionlint runs `npm install @actions/tool-cache` in the
      # repo root to fetch the linter binary. npm cannot parse our pnpm
      # `workspace:` dependencies and fails with EUNSUPPORTEDPROTOCOL, so move
      # the manifest aside while the action runs. actionlint itself does not
      # need it, and the normal repo layout is preserved so the reusable
      # workflow reference in release.yml still resolves.
      - name: Hide workspace manifest from the action's bundled npm install
        run: mv package.json "$RUNNER_TEMP/package.json.bak"

      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

      - name: Restore workspace manifest
        if: always()
        run: mv "$RUNNER_TEMP/package.json.bak" package.json

  zizmor:
    name: zizmor (Actions security analysis)
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      security-events: write # upload SARIF to GitHub Advanced Security
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: pedantic
          config: .github/zizmor.yml
