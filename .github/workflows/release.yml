name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  prepare:
    name: Prepare Release
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'theQRL/web3.js' && vars.RELEASES_ENABLED == 'true'
    environment: npm-publish
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.released.outputs.released }}
      count: ${{ steps.released.outputs.count }}
      packages: ${{ steps.released.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages before release analysis
        run: pnpm run build

      - name: Build browser bundles before release analysis
        run: pnpm run build:web

      - name: Inspect package tarballs before release analysis
        run: pnpm run release:inspect-packages

      - name: Snapshot package versions
        run: node scripts/release/packages.js snapshot .release/release-versions-before.json

      - name: Detect bypass deploy key
        # Branch protection on main may block direct pushes from the default
        # GITHUB_TOKEN. If a deploy key with bypass permission is provisioned
        # as `BYPASS_SSH_KEY`, the next two steps wire it up; otherwise we
        # fall through to the default token and discover at push time
        # whether protection allows it.
        id: bypass
        env:
          BYPASS_SSH_KEY: ${{ secrets.BYPASS_SSH_KEY }}
        run: |
          if [ -n "${BYPASS_SSH_KEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Bypass deploy key detected; routing git pushes through SSH."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No bypass key; pushes will use the default GITHUB_TOKEN."
          fi

      - name: Setup SSH agent for bypass deploy key
        if: steps.bypass.outputs.available == 'true'
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.BYPASS_SSH_KEY }}

      - name: Route git origin through SSH
        if: steps.bypass.outputs.available == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin "git@github.com:${{ github.repository }}.git"

      - name: Coordinate lockstep release
        # If there are releasable commits since the last per-package tag, refresh
        # the .release-touch stamp in every package and create a `fix(release)`
        # commit so multi-semantic-release sees a touch in every package and
        # bumps them together. The commit is pushed to main BEFORE
        # multi-semantic-release tags and publishes, so every published tag
        # references a commit reachable from main. Without this, the tags
        # (and the SLSA provenance attached to the npm tarballs) point at a
        # runner-local commit that is destroyed when the job finishes,
        # making the release unverifiable. `[skip ci]` prevents the push
        # itself from re-triggering this workflow.
        run: |
          set -euo pipefail
          last_release=$(git tag --list '@theqrl/*@*.*.*' | sort -V | tail -n1 || true)
          if [ -z "$last_release" ]; then
            echo "No prior release tag found; proceeding with full lockstep."
            needs_release=true
          else
            echo "Last release tag: $last_release"
            releasable=$(git log "${last_release}..HEAD" --pretty=%s \
              | grep -E '^(feat|fix|perf)(\(.+\))?!?:' || true)
            if [ -n "$releasable" ]; then
              echo "Releasable commits since ${last_release}:"
              echo "$releasable"
              needs_release=true
            else
              echo "No releasable commits since ${last_release}; skipping lockstep touch."
              needs_release=false
            fi
          fi
          if [ "$needs_release" = "true" ]; then
            pnpm run release:touch-packages
            if ! git diff --quiet -- packages tools; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add packages tools
              git commit -m "fix(release): coordinated lockstep touch [skip ci]"
              git push origin HEAD:main
            else
              echo "No new touches to commit (already aligned for this push)."
            fi
          fi

      - name: Run multi-semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: pnpm run release

      - name: Detect released packages
        id: released
        run: node scripts/release/packages.js diff .release/release-versions-before.json .release/released-packages.json

      - name: Rebuild packages after version updates
        if: steps.released.outputs.released == 'true'
        run: pnpm run build

      - name: Rebuild browser bundles after version updates
        if: steps.released.outputs.released == 'true'
        run: pnpm run build:web

      - name: Inspect package tarballs after version updates
        if: steps.released.outputs.released == 'true'
        run: pnpm run release:inspect-packages

      - name: Pack released packages
        if: steps.released.outputs.released == 'true'
        run: |
          mkdir -p dist/tarballs
          test -s .release/released-packages.tsv
          while IFS=$'\t' read -r package_path package_name package_version _release_tag _tarball_name; do
            echo "Packing ${package_name}@${package_version}"
            pnpm --dir "${package_path}" pack --pack-destination ../../dist/tarballs
          done < .release/released-packages.tsv
          cp .release/released-packages.json .release/released-packages.tsv dist/

      - name: Generate checksums
        if: steps.released.outputs.released == 'true'
        run: |
          sha256sum dist/tarballs/*.tgz > dist/checksums-sha256.txt
          sha512sum dist/tarballs/*.tgz > dist/checksums-sha512.txt

      - name: Upload release candidate tarballs
        if: steps.released.outputs.released == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate-tarballs
          path: |
            dist/tarballs/*.tgz
            dist/released-packages.json
            dist/released-packages.tsv
            dist/checksums-sha256.txt
            dist/checksums-sha512.txt
          retention-days: 5

  smoke-node20:
    name: Smoke Tarballs (Node 20)
    needs: prepare
    if: needs.prepare.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Download release candidate tarballs
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-tarballs
          path: dist

      - name: Smoke test packed tarballs
        run: node scripts/release/smoke-tarballs.js dist/released-packages.tsv dist/tarballs

  publish:
    name: Publish
    needs: [prepare, smoke-node20]
    if: needs.prepare.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      NPM_CONFIG_PROVENANCE: "true"
      NPM_CONFIG_ACCESS: public
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/

      - name: Use npm 11 for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Download release candidate tarballs
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-tarballs
          path: dist

      - name: Publish tarballs with trusted publishing
        run: |
          while IFS=$'\t' read -r _package_path package_name package_version _release_tag tarball_name; do
            echo "Publishing ${package_name}@${package_version}"
            npm publish "dist/tarballs/${tarball_name}" --access public
          done < dist/released-packages.tsv

      - name: Generate SBOM SPDX
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: dist/sbom-spdx.json
          artifact-name: sbom-spdx.json

      - name: Generate SBOM CycloneDX
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: dist/sbom-cyclonedx.json
          artifact-name: sbom-cyclonedx.json

      - name: Attest release artefacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/tarballs/*.tgz
            dist/checksums-sha256.txt
            dist/checksums-sha512.txt

      - name: Attest SBOM SPDX
        uses: actions/attest-sbom@v4
        with:
          subject-path: dist/sbom-spdx.json
          sbom-path: dist/sbom-spdx.json

      - name: Attest SBOM CycloneDX
        uses: actions/attest-sbom@v4
        with:
          subject-path: dist/sbom-cyclonedx.json
          sbom-path: dist/sbom-cyclonedx.json

      - name: Upload release artefacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS=$'\t' read -r _package_path _package_name _package_version release_tag tarball_name; do
            gh release upload "${release_tag}" \
              "dist/tarballs/${tarball_name}" \
              dist/checksums-sha256.txt \
              dist/checksums-sha512.txt \
              dist/sbom-spdx.json \
              dist/sbom-cyclonedx.json \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          done < dist/released-packages.tsv

  slsa-subjects:
    name: Compute SLSA Subjects
    needs: prepare
    if: needs.prepare.outputs.released == 'true'
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download release candidate tarballs
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-tarballs
          path: dist

      - name: Generate SLSA subject hashes
        id: hash
        run: |
          set -euo pipefail
          cd dist/tarballs
          echo "hashes=$(sha256sum ./*.tgz | base64 -w0)" >> "$GITHUB_OUTPUT"

  slsa-provenance:
    name: SLSA Provenance
    needs: [prepare, publish, slsa-subjects]
    if: needs.prepare.outputs.released == 'true'
    permissions:
      actions: read
      id-token: write
      contents: write
    # NOTE: SLSA generator must be referenced by tag, not SHA — the reusable
    # workflow inspects its own caller-ref to embed the version into the
    # provenance and aborts when called by digest. See:
    # https://github.com/slsa-framework/slsa-github-generator/blob/main/internal/builders/generic/README.md
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.slsa-subjects.outputs.hashes }}
      upload-assets: false
      provenance-name: provenance.intoto.jsonl

  slsa-upload:
    name: Upload SLSA Provenance
    needs: [prepare, publish, slsa-provenance]
    if: needs.prepare.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release metadata
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-tarballs
          path: dist

      - name: Download SLSA provenance
        uses: actions/download-artifact@v8
        with:
          name: provenance.intoto.jsonl
          path: dist

      - name: Upload SLSA provenance to package releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS=$'\t' read -r _package_path _package_name _package_version release_tag _tarball_name; do
            gh release upload "${release_tag}" \
              dist/provenance.intoto.jsonl \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          done < dist/released-packages.tsv
