packages:
  - "packages/*"
  - "tools/*"
  - "docs"

linkWorkspacePackages: true
nodeLinker: hoisted

# Supply-chain hardening for dependency resolution and install scripts.
# Values are in minutes; 10080 minutes is 7 days.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
- '@theqrl/*'
# CVE remediation — bypass quarantine for security-only patch releases
- '@babel/plugin-transform-modules-systemjs'
- 'fast-uri'
blockExoticSubdeps: true
overrides:
  "braces@<3.0.3": "3.0.3"
  "undici@<6.27.0": "6.27.0"
  "undici@>=7.0.0 <7.28.0": "7.28.0"
  "fast-uri@<3.1.2": "3.1.2"
  # CVE-2026-13149 — brace-expansion ReDoS (high); patch floor per major line
  "brace-expansion@<1.1.16": "1.1.16"
  "brace-expansion@>=2.0.0 <2.1.2": "2.1.2"
  "brace-expansion@>=5.0.0 <5.0.7": "5.0.7"
  # CVE remediation — shell-quote newline escaping (critical) + ws memory-exhaustion DoS (high)
  "shell-quote@<1.8.4": "1.9.0"
  "ws@>=7.0.0 <7.5.11": "7.5.11"
  "ws@>=8.0.0 <8.21.0": "8.21.0"
  # CVE remediation — high/critical in dev tooling (Trivy HIGH,CRITICAL gate)
  "adm-zip@<0.6.0": "0.6.0"
  "http-proxy-middleware@<2.0.10": "2.0.10"
  "http-proxy-middleware@>=4.0.0 <4.1.1": "4.2.0"
  "linkify-it@<5.0.1": "5.0.2"
  "tmp@<0.2.6": "0.2.7"
  "websocket-driver@<0.7.5": "0.7.5"
  "@babel/plugin-transform-modules-systemjs@<7.29.4": "7.29.4"
  "qs@>=6.11.1 <6.15.2": "6.15.3"
  "cookie@<0.7.0": "0.7.2"
  "markdown-it@<14.2.0": "14.3.0"
  "joi@<17.13.4": "17.13.4"
  "launch-editor@<2.14.1": "2.14.1"
  "webpack-dev-server@<5.2.5": "5.2.6"
  "@babel/core@<7.29.6": "7.29.7"
  "uuid@<11.1.1": "11.1.1"
  "js-yaml@>=3.0.0 <4.0.0": "3.15.0"
  "js-yaml@>=4.0.0 <4.2.0": "4.3.0"
  "@docusaurus/core": 3.10.1
  "@docusaurus/mdx-loader": 3.10.1
  "@docusaurus/module-type-aliases": 3.10.1
  "@docusaurus/plugin-content-blog": 3.10.1
  "@docusaurus/plugin-content-docs": 3.10.1
  "@docusaurus/plugin-content-pages": 3.10.1
  "@docusaurus/plugin-css-cascade-layers": 3.10.1
  "@docusaurus/plugin-debug": 3.10.1
  "@docusaurus/plugin-google-analytics": 3.10.1
  "@docusaurus/plugin-google-gtag": 3.10.1
  "@docusaurus/plugin-google-tag-manager": 3.10.1
  "@docusaurus/plugin-sitemap": 3.10.1
  "@docusaurus/plugin-svgr": 3.10.1
  "@docusaurus/preset-classic": 3.10.1
  "@docusaurus/theme-classic": 3.10.1
  "@docusaurus/theme-common": 3.10.1
  "@docusaurus/theme-live-codeblock": 3.10.1
  "@docusaurus/theme-search-algolia": 3.10.1
  "@docusaurus/types": 3.10.1
  "@docusaurus/utils": 3.10.1
  "@docusaurus/utils-common": 3.10.1
  "@docusaurus/utils-validation": 3.10.1
  baseline-browser-mapping: 2.8.9
  browserslist: 4.26.3
  es-module-lexer: 2.0.0
  express: 5.2.1
  loader-runner: 4.3.1
  path-to-regexp: 0.1.13
  "schema-utils@4>ajv": 8.17.1
  serialize-javascript: 7.0.5
  socks: 2.8.7
  webpack: 5.107.1
  webpack-sources: 3.3.3
strictDepBuilds: true
allowBuilds:
  "@parcel/watcher": true
  bufferutil: true
  core-js: true
  es5-ext: true
  keccak: true
  nx: true
  secp256k1: true
  unrs-resolver: true
  utf-8-validate: true
  web3: true
  web3-bzz: true
  web3-shh: true
